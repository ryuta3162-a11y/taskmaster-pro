<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理ダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* タイポグラフィ（index の appText と同階層） */
      --tm-title: 1rem;
      --tm-section: 0.875rem;
      --tm-body: 0.875rem;
      --tm-meta: 0.75rem;
      --tm-badge: 0.6875rem;
      --acc-50: oklch(96.2% 0.018 272.314);
      --acc-100: oklch(93% 0.034 272.788);
      --acc-200: oklch(87% 0.065 274.039);
      --acc-300: oklch(78.5% 0.115 274.713);
      --acc-400: oklch(67.3% 0.182 276.935);
      --acc-500: oklch(58.5% 0.233 277.117);
      --acc-600: oklch(51.1% 0.262 276.966);
      --acc-700: oklch(45.7% 0.24 277.023);
      --acc-900: oklch(35.9% 0.144 278.697);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: #f2f2f7;
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .shell {
      display: flex; flex-direction: column; min-height: 100dvh;
      max-width: 32rem; margin: 0 auto; width: 100%;
    }
    @media (min-width: 768px) {
      .shell { max-width: none; }
    }

    /* --- header（利用者アプリと同型） --- */
    .topbar {
      position: sticky; top: 0; z-index: 40; flex-shrink: 0;
      height: 3.5rem;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
    }
    @media (min-width: 768px) { .topbar { height: 4rem; padding: 0 2rem; } }
    .brand-wrap { display: flex; align-items: center; gap: .75rem; min-width: 0; flex: 1; }
    .brand-mark {
      width: 2.25rem; height: 2.25rem; border-radius: 10px;
      background: var(--acc-500); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.06); flex-shrink: 0;
    }
    .brand-mark svg { width: 1.1rem; height: 1.1rem; stroke-width: 3; }
    .brand-col { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
    .brand-col .sub {
      font-size: 7px; font-weight: 600; letter-spacing: .18em;
      color: #64748b; text-transform: uppercase;
    }
    @media (min-width: 640px) { .brand-col .sub { font-size: 8px; } }
    .brand-col h1 {
      margin: 0; font-size: 1rem; font-weight: 700;
      letter-spacing: -.02em; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    @media (min-width: 640px) { .brand-col h1 { font-size: 1.125rem; } }
    .brand-col h1.sm-only { display: block; }
    @media (min-width: 640px) {
      .brand-col { display: flex; }
      .brand-col h1.sm-only { display: none; }
    }
    .page-title {
      font-size: .875rem; font-weight: 600; color: #64748b;
      letter-spacing: -.01em; margin-left: .25rem; white-space: nowrap;
    }
    @media (max-width: 639px) { .page-title { display: none; } }

    .account-wrap { position: relative; flex-shrink: 0; }
    .account-btn {
      width: 2.25rem; height: 2.25rem; border-radius: 9999px; border: none; cursor: pointer;
      background: linear-gradient(to bottom right, var(--acc-500), var(--acc-700));
      color: #fff; font-size: .875rem; font-weight: 700;
      box-shadow: 0 0 0 2px #fff, 0 4px 14px -4px var(--acc-500);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .account-btn:active { transform: scale(.95); }
    .menu-backdrop {
      display: none; position: fixed; inset: 0; z-index: 45;
      background: rgba(0,0,0,.2); backdrop-filter: blur(2px);
    }
    .menu-backdrop.open { display: block; }
    .account-menu {
      display: none; position: absolute; right: 0; top: calc(100% + .5rem);
      width: min(18rem, 92vw); max-height: min(88vh, 36rem);
      background: rgba(255,255,255,.95); backdrop-filter: blur(16px);
      border-radius: 1rem; border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 20px 50px rgba(0,0,0,.15); z-index: 50; overflow: hidden;
      flex-direction: column;
    }
    .account-menu.open { display: flex; }
    .menu-head { padding: 1rem; border-bottom: 1px solid #f1f5f9; }
    .menu-head .who { font-weight: 600; font-size: .9rem; color: #0f172a; word-break: break-all; }
    .menu-head .mail { font-size: 11px; color: #64748b; margin-top: .15rem; word-break: break-all; }
    .menu-meta { padding: .65rem 1rem; font-size: .68rem; color: #64748b; font-weight: 500; border-bottom: 1px solid #f1f5f9; }
    .menu-accent { padding: .75rem 1rem; border-top: 1px solid #e2e8f0; background: linear-gradient(to bottom, #f8fafc, #fff); }
    .menu-accent label {
      display: block; font-size: 9px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: var(--acc-600); margin-bottom: .5rem;
    }
    .accent-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .35rem; }
    .accent-swatch {
      height: 2rem; border-radius: .5rem; border: 2px solid #e2e8f0;
      cursor: pointer; padding: 0; transition: all .15s;
    }
    .accent-swatch.on { border-color: #0f172a; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #0f172a; }
    .accent-current { text-align: center; font-size: 10px; font-weight: 700; color: #64748b; margin-top: .5rem; }
    .accent-current span { color: var(--acc-700); }
    .menu-actions { padding: .5rem; border-top: 1px solid #f1f5f9; background: rgba(248,250,252,.8); }
    .menu-link {
      display: flex; align-items: center; gap: .5rem; width: 100%;
      padding: .65rem .75rem; border: none; background: transparent;
      border-radius: .75rem; font-size: .8rem; font-weight: 600; color: #334155;
      cursor: pointer; text-decoration: none; text-align: left;
    }
    .menu-link:hover { background: #f1f5f9; }

    /* --- main --- */
    .main { flex: 1; overflow: auto; padding: 1rem .25rem 6rem; background: #f2f2f7; }
    @media (min-width: 768px) { .main { padding: 1.5rem 1rem 6rem; } }
    .main-inner { max-width: 120rem; margin: 0 auto; width: 100%; padding: 0 .25rem; }
    @media (min-width: 768px) { .main-inner { padding: 0 1rem; } }
    .stack { display: flex; flex-direction: column; gap: 1rem; margin-top: .25rem; width: 100%; }

    /* ステータスバー（トップ画面と同型） */
    .status-strip {
      background: #fff; border-radius: 1rem;
      padding: .75rem 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
      display: flex; flex-wrap: wrap; align-items: baseline; gap: .35rem .9rem;
      font-size: .875rem; color: #475569;
    }
    .status-strip strong { color: #0f172a; font-weight: 800; font-size: 1rem; font-variant-numeric: tabular-nums; }
    .status-strip .sep { color: #cbd5e1; user-select: none; }
    .status-strip .warn strong { color: #e11d48; }

    /* トップ画面のメニュー相当 */
    .mode-grid {
      display: flex;
      flex-direction: column;
      gap: .625rem;
      width: 100%;
    }
    @media (min-width: 768px) {
      .mode-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: .75rem;
      }
    }
    @media (min-width: 1280px) {
      .mode-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    .mode-nav-tile {
      width: 100%;
      text-align: left;
      background: #fff;
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    @media (min-width: 768px) {
      .mode-nav-tile { padding: 1.25rem; border-radius: 1rem; }
    }
    .mode-nav-tile:active { transform: scale(.99); }
    .mode-nav-tile.on {
      border-color: color-mix(in oklch, var(--acc-500) 55%, transparent);
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 2px color-mix(in oklch, var(--acc-500) 18%, transparent);
    }
    .mode-nav-tile.on .mode-nav-icon {
      background: linear-gradient(to bottom right, var(--acc-500), var(--acc-700));
      color: #fff;
    }
    .mode-nav-icon {
      width: 3rem;
      height: 3rem;
      border-radius: .75rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--acc-50);
      color: var(--acc-700);
    }
    .mode-nav-icon svg { width: 1.25rem; height: 1.25rem; transform: scale(.85); }
    .mode-nav-label {
      margin: 0;
      flex: 1;
      font-size: var(--tm-title);
      font-weight: 600;
      color: #0f172a;
      line-height: 1.3;
    }
    .mode-nav-badge {
      background: var(--acc-600);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 9999px;
      flex-shrink: 0;
      min-width: 1.25rem;
      text-align: center;
    }
    .mode-nav-badge.empty { display: none; }
    .mode-nav-chev {
      color: #cbd5e1;
      flex-shrink: 0;
      display: inline-flex;
      transform: scale(.75) rotate(180deg);
    }
    .mode-nav-chev svg { width: 1.25rem; height: 1.25rem; }

    /* PanelFrame + chip arena（フィルタ用） */
    .panel-frame {
      position: relative; border-radius: 1rem; overflow: hidden;
      border: 1px solid color-mix(in oklch, var(--acc-300) 40%, transparent);
      box-shadow: 0 8px 32px -12px rgba(0,0,0,.1);
    }
    .panel-frame::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom right, color-mix(in oklch, var(--acc-50) 75%, transparent), #fff, #f8fafc);
    }
    .panel-frame::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(to bottom, #34d399, var(--acc-500), var(--acc-700));
    }
    .panel-inner { position: relative; padding: 1rem 1rem 1rem 1.35rem; }
    .chip-arena {
      display: flex; flex-direction: column; gap: .65rem;
      border-radius: .75rem;
      border: 1px solid color-mix(in oklch, var(--acc-200) 45%, transparent);
      background: linear-gradient(to bottom, rgba(15,23,42,.03), #fff, color-mix(in oklch, var(--acc-50) 25%, transparent));
      padding: .75rem;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.05);
    }
    .chip-arena .filter-block {
      margin: 0; padding: 0; border: none; background: transparent;
    }
    .chip-arena .filter-block + .filter-block {
      margin-top: 0; padding-top: .55rem;
      border-top: 1px solid #e2e8f0;
    }
    .chip-row {
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .chip {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 2.5rem; padding: .5rem .85rem; border-radius: .75rem;
      font-size: var(--tm-body); font-weight: 600; cursor: pointer; border: none;
      background: rgba(255,255,255,.9); color: #334155;
      border: 1px solid color-mix(in oklch, var(--acc-200) 60%, transparent);
      transition: all .15s;
    }
    .chip:hover { border-color: var(--acc-400); background: color-mix(in oklch, var(--acc-50) 60%, white); }
    .chip.on {
      background: linear-gradient(to bottom right, var(--acc-500), var(--acc-700));
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px -4px var(--acc-500);
    }
    .badge-type-new { background: #f1f5f9; color: #334155; }
    .badge-type-repost { background: #e0f2fe; color: #0369a1; }
    .badge-type-remind { background: #ffedd5; color: #c2410c; }

    /* 依頼カード（一覧・展開用） */
    .task-list { display: flex; flex-direction: column; gap: .625rem; }
    .menu-tile {
      width: 100%; text-align: left; background: #fff;
      border-radius: 1rem; padding: 1rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
      display: flex; align-items: flex-start; gap: 1rem;
      cursor: pointer; transition: transform .15s;
    }
    @media (min-width: 768px) { .menu-tile { padding: 1.25rem; } }
    .menu-tile:active { transform: scale(.99); }
    .menu-tile.open { border-color: color-mix(in oklch, var(--acc-300) 50%, transparent); }
    .menu-icon {
      width: 3rem; height: 3rem; border-radius: .75rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--acc-50); color: var(--acc-700);
    }
    .menu-icon svg { width: 1.35rem; height: 1.35rem; }
    .menu-body { flex: 1; min-width: 0; }
    .badges { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .35rem; }
    .badge {
      font-size: .65rem; font-weight: 700; padding: .12rem .45rem; border-radius: .4rem;
    }
    .badge-run { background: var(--acc-50); color: var(--acc-900); border: 1px solid var(--acc-200); }
    .badge-ok { background: #f1f5f9; color: #475569; }
    .badge-late { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .badge-kind-e { background: linear-gradient(to right, var(--acc-600), var(--acc-700)); color: #fff; }
    .badge-kind-s { background: var(--acc-900); color: #fff; }
    .task-title { font-size: var(--tm-title); font-weight: 700; line-height: 1.55; margin: 0 0 .25rem; word-break: break-word; white-space: pre-wrap; color: #0f172a; }
    .task-meta { font-size: var(--tm-meta); color: #64748b; font-weight: 500; }
    .prog-wrap { margin-top: .45rem; max-width: 9rem; }
    .prog { height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .prog > i { display: block; height: 100%; background: linear-gradient(90deg, var(--acc-500), var(--acc-700)); border-radius: 99px; }
    .tile-chev {
      color: #cbd5e1; flex-shrink: 0; margin-top: .35rem;
      transform: rotate(180deg); transition: transform .2s, color .2s;
    }
    .menu-tile.open .tile-chev { transform: rotate(270deg); color: var(--acc-600); }

    .task-expand-wrap { display: none; margin-top: -.35rem; }
    .task-expand-wrap.open { display: block; }
    .expand-panel { margin-top: 0; }
    .expand-toolbar {
      display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .75rem; align-items: center;
    }
    .expand-toolbar .hint { font-size: var(--tm-meta); color: #64748b; font-weight: 600; flex: 1; min-width: 8rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .55rem 1rem; font-size: .8rem; font-weight: 600; border-radius: 1rem;
      border: 1px solid rgba(0,0,0,.06); background: #fff; color: #334155;
      cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .btn-primary {
      background: var(--acc-500); color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px -4px var(--acc-500);
    }
    .btn-primary:hover { background: var(--acc-600); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: .4rem .75rem; font-size: .75rem; }

    .recipient {
      display: flex; align-items: flex-start; gap: .55rem; padding: .6rem .7rem;
      border: 1px solid rgba(0,0,0,.05); border-radius: .75rem; margin-bottom: .4rem;
      background: rgba(255,255,255,.85);
    }
    .recipient.done {
      opacity: .5; background: #f1f5f9; border-color: #e2e8f0;
      cursor: not-allowed; pointer-events: none;
    }
    .recipient.done .recipient-name { color: #94a3b8; }
    .assignee-row {
      display: flex; align-items: flex-start; gap: .65rem;
      padding: .65rem .75rem; border: 1px solid rgba(0,0,0,.05);
      border-radius: .75rem; margin-bottom: .45rem; background: #fff;
    }
    .assignee-row input[type=checkbox] { width: 1.1rem; height: 1.1rem; margin-top: .2rem; accent-color: var(--acc-600); flex-shrink: 0; }
    .assignee-name { flex-shrink: 0; min-width: 5.5rem; max-width: 8rem; }
    .assignee-name .recipient-name { font-size: .82rem; font-weight: 700; color: #0f172a; line-height: 1.35; }
    .assignee-name .recipient-sub { font-size: .65rem; color: #64748b; margin-top: .1rem; word-break: break-all; }
    .assignee-stores {
      flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: center; gap: .35rem;
      padding-top: .05rem;
    }
    .store-chip {
      font-size: .72rem; font-weight: 600; color: var(--acc-900);
      background: var(--acc-50); border: 1px solid var(--acc-200);
      border-radius: .5rem; padding: .2rem .55rem; line-height: 1.3;
    }
    .assignee-arrow { color: #cbd5e1; font-size: .75rem; font-weight: 700; flex-shrink: 0; padding-top: .15rem; }
    .recipient input[type=checkbox] { width: 1.1rem; height: 1.1rem; margin-top: .15rem; accent-color: var(--acc-600); flex-shrink: 0; }
    .recipient-name { font-size: var(--tm-body); font-weight: 600; }
    .recipient-sub { font-size: .68rem; color: #64748b; margin-top: .15rem; }
    .recipient-label { flex: 1; min-width: 0; }
    .status-pill { font-size: var(--tm-badge); font-weight: 700; padding: .15rem .45rem; border-radius: .35rem; flex-shrink: 0; }
    .status-pill.ok { background: #ecfdf5; color: #047857; }
    .status-pill.ng { background: #fff1f2; color: #be123c; }

    .empty, .loading {
      text-align: center; padding: 3rem 1rem; font-weight: 600; font-size: .9rem; color: #94a3b8;
    }
    .loading { color: var(--acc-600); }
    .err {
      padding: 1.5rem; text-align: center; font-weight: 600; color: #e11d48;
      background: #fff; border-radius: 1rem; border: 1px solid #fecaca;
    }

    .intro-block {
      margin: 0 0 .75rem; padding: .65rem .8rem;
      border-radius: .8rem; background: #fff;
      border: 1px solid color-mix(in oklch, var(--acc-200) 50%, transparent);
    }
    .intro-block label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: var(--tm-meta); font-weight: 700; color: var(--acc-700);
      margin-bottom: .35rem;
    }
    .intro-block label .right { display: flex; gap: .35rem; }
    .intro-block textarea {
      width: 100%; min-height: 5.5rem; resize: vertical;
      border: 1px solid #e2e8f0; border-radius: .55rem;
      padding: .55rem .65rem; font-size: .82rem; line-height: 1.55;
      font-family: inherit; color: #0f172a;
      background: #fafafe; outline: none;
    }
    .intro-block textarea:focus { border-color: var(--acc-400); background: #fff; }
    .btn-link {
      background: transparent; border: none; padding: 0;
      font-size: .7rem; font-weight: 700; color: var(--acc-600); cursor: pointer;
    }
    .btn-link:hover { text-decoration: underline; }
    .send-note {
      margin: .75rem 0 0; padding: .6rem .75rem; border-radius: .65rem;
      background: color-mix(in oklch, var(--acc-50) 60%, white);
      border: 1px solid color-mix(in oklch, var(--acc-200) 50%, transparent);
      font-size: .7rem; color: #475569; line-height: 1.5;
    }
    .send-note strong { color: var(--acc-700); }

    /* リマインド効果 */
    .effect-summary {
      background: #fff; border-radius: 1rem;
      padding: 1rem 1.15rem 1.15rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
    }
    .effect-summary h3 {
      margin: 0 0 .35rem; font-size: 1rem; font-weight: 800; color: #0f172a;
    }
    .effect-summary .effect-lead {
      margin: 0 0 .9rem; font-size: .78rem; color: #64748b; line-height: 1.5; font-weight: 600;
    }
    .effect-stages {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: .55rem;
    }
    @media (max-width: 900px) {
      .effect-stages { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .effect-stages { grid-template-columns: 1fr; }
    }
    .effect-stage {
      border-radius: .85rem;
      padding: .75rem .8rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      text-align: center;
    }
    .effect-stage.is-overdue {
      background: #fff1f2;
      border-color: #fecdd3;
    }
    .effect-stage.is-overdue .pct { color: #be123c; }
    .effect-stage.is-na .pct { color: #94a3b8; font-size: 1.35rem; }
    .effect-stage .lbl {
      display: block; font-size: .68rem; font-weight: 800;
      letter-spacing: .04em; color: #64748b; margin-bottom: .25rem;
    }
    .effect-stage .pct {

      function renderPersonStats(stats, filterRoles, filterTeams) {
        var list = stats || [];
        var roles = filterRoles || [];
        var teams = filterTeams || [];
        var selectedRoleKeys = Object.keys(personFilterRoles).filter(function (k) { return personFilterRoles[k]; });
        var selectedTeamKeys = Object.keys(personFilterTeams).filter(function (k) { return personFilterTeams[k]; });

        var filtered = list.filter(function (p) {
          if (selectedRoleKeys.length) {
            if (selectedRoleKeys.indexOf(String(p.role || '')) < 0) return false;
          }
          if (selectedTeamKeys.length) {
            var pTeams = (p.teams && p.teams.length)
              ? p.teams
              : String(p.team || '').split(/[,、\/／|｜]/).map(function (t) { return t.trim(); }).filter(Boolean);
            if (!pTeams.length) return false;
            var hit = false;
            for (var i = 0; i < pTeams.length; i++) {
              if (selectedTeamKeys.indexOf(pTeams[i]) >= 0) { hit = true; break; }
            }
            if (!hit) return false;
          }
          return true;
        });

        var h = '<div class="effect-section" id="personStatsSection">';
        h += '<h4>個人別（期限内 / 超過）</h4>';
        h += '<p class="effect-lead">リマインド対象依頼における、各人の期限内完了と超過の件数です。役職・TFチームで絞り込めます。</p>';

        if (roles.length) {
          h += '<div class="filter-block"><span class="filter-label">役職</span><div class="filter-checks">';
          roles.forEach(function (r) {
            var on = !!personFilterRoles[r];
            h += '<label class="filter-check' + (on ? ' on' : '') + '">';
            h += '<input type="checkbox" data-person-filter="role" value="' + esc(r) + '"' + (on ? ' checked' : '') + ' />';
            h += esc(r) + '</label>';
          });
          h += '</div></div>';
        }
        if (teams.length) {
          h += '<div class="filter-block"><span class="filter-label">TFチーム</span><div class="filter-checks">';
          teams.forEach(function (t) {
            var on = !!personFilterTeams[t];
            h += '<label class="filter-check' + (on ? ' on' : '') + '">';
            h += '<input type="checkbox" data-person-filter="team" value="' + esc(t) + '"' + (on ? ' checked' : '') + ' />';
            h += esc(t) + '</label>';
          });
          h += '</div></div>';
        }
        if (roles.length || teams.length) {
          h += '<div class="filter-actions">';
          h += '<button type="button" class="btn-link" data-person-filter-clear>絞り込みをクリア</button>';
          h += '<span class="effect-lead" style="margin:0">表示 ' + filtered.length + ' / ' + list.length + ' 名</span>';
          h += '</div>';
        }

        if (!list.length) {
          h += '<p class="effect-lead">データがありません</p></div>';
          return h;
        }
        if (!filtered.length) {
          h += '<p class="effect-lead">条件に一致する人がいません</p></div>';
          return h;
        }

        h += '<div style="overflow:auto"><table class="person-table"><thead><tr>';
        h += '<th>名前</th><th>役職</th><th>TF</th><th>メール</th><th>期限内</th><th>超過</th>';
        h += '</tr></thead><tbody>';
        filtered.forEach(function (p) {
          var teamLabel = (p.teams && p.teams.length) ? p.teams.join('、') : (p.team || '—');
          h += '<tr>';
          h += '<td class="name">' + esc(p.name || '—') + '</td>';
          h += '<td class="meta">' + esc(p.role || '—') + '</td>';
          h += '<td class="meta">' + esc(teamLabel) + '</td>';
          h += '<td class="mail">' + esc(p.email || '') + '</td>';
          h += '<td class="num ok">' + (p.onTimeCount || 0) + '件</td>';
          h += '<td class="num over">' + (p.overdueCount || 0) + '件</td>';
          h += '</tr>';
        });
        h += '</tbody></table></div></div>';
        return h;
      }

      function applyAccent(id) {
        var t = ACCENT_THEMES.find(function (x) { return x.id === id; }) || ACCENT_THEMES[0];
        ['50','100','200','300','400','500','600','700','900'].forEach(function (k) {
          document.documentElement.style.setProperty('--acc-' + k, t[k]);
        });
        try { localStorage.setItem(ACCENT_STORAGE_KEY, t.id); } catch (e) {}

        });

      function readAccent() {
        try {
          var v = localStorage.getItem(ACCENT_STORAGE_KEY);
          if (v === 'indigo') {
            try { localStorage.setItem(ACCENT_STORAGE_KEY, 'black'); } catch (e2) {}
            return 'black';
          }
          if (v && ACCENT_THEMES.some(function (t) { return t.id === v; })) return v;

      function selKey(taskId, key) { return taskId + '::' + key; }

      function getTasksForMode() {
        if (!lastData) return [];
        if (mode === 'employee') return lastData.employeeTasks || [];
        if (mode === 'store') return lastData.storeTasks || [];
        if (mode === 'tf') return lastData.tfTasks || [];
        return [];

      function normalizePostType(type) {
        var t = String(type || '').trim();
        if (t.indexOf('リマインド') >= 0) return 'remind';
        if (t.indexOf('再投稿') >= 0) return 'repost';
        return 'new';
      }

      function postTypeBadgeClass(type) {
        var pt = normalizePostType(type);
        if (pt === 'remind') return 'badge-type-remind';
        if (pt === 'repost') return 'badge-type-repost';
        return 'badge-type-new';
      }

      function filterTasks(list) {
        return list.filter(function (t) {
          if (typeFilter !== 'all' && normalizePostType(t.type) !== typeFilter) return false;
          if (filter === 'open') return !t.complete;
          if (filter === 'late') return !t.complete && t.overdue;
          return true;
        });
      }

      function renderStats() {
        var bar = document.getElementById('statsBar');
        if (mode === 'reminderEffect') {
          var s = (lastData.reminderEffects && lastData.reminderEffects.summary) || {};
          bar.innerHTML =
            '対象依頼 <strong>' + (s.taskCount || 0) + '</strong><span style="font-weight:700;color:#64748b"> 件</span>' +
            '<span class="sep">/</span>' +
            '<span class="warn">未実施 <strong>' + (s.overduePeopleCount || 0) + '</strong><span style="font-weight:700;color:#64748b"> 名</span></span>' +
            '<span class="sep">/</span>' +
            '当日進捗 <strong>' + (s.at0d && s.at0d.available ? s.at0d.pct + '%' : '—') + '</strong>';
          return;
        }
        var list = getTasksForMode().filter(function (t) {
          return typeFilter === 'all' || normalizePostType(t.type) === typeFilter;
        });
        var open = list.filter(function (t) { return !t.complete; }).length;
        var late = list.filter(function (t) { return !t.complete && t.overdue; }).length;
        var done = list.filter(function (t) { return t.complete; }).length;
        var total = list.length;
        var rate = total ? Math.round((done / total) * 100) : 0;
        bar.innerHTML =
          '未完了 <strong>' + open + '</strong><span style="font-weight:700;color:#64748b"> 件</span>' +
          '<span class="sep">/</span>' +
          '<span class="warn">期限超過 <strong>' + late + '</strong><span style="font-weight:700;color:#64748b"> 件</span></span>' +
          '<span class="sep">/</span>' +
          '完了率 <strong>' + rate + '</strong><span style="font-weight:700;color:#64748b"> %</span>';

        h += '<textarea data-intro-task="' + esc(task.id) + '" rows="5" spellcheck="false">' + esc(introText) + '</textarea>';

            else delete selected[sk];
          });
        });

        document.querySelectorAll('textarea[data-intro-task]').forEach(function (ta) {
          ta.addEventListener('click', function (e) { e.stopPropagation(); });

            introOverrides[tid] = ta.value;
          });
        });

        document.querySelectorAll('[data-reset-intro]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();

            var tid = btn.getAttribute('data-reset-intro');
            delete introOverrides[tid];
            var ta = document.querySelector('textarea[data-intro-task="' + tid + '"]');
            if (ta) ta.value = defaultIntroText();
          });
        });

        document.querySelectorAll('[data-select-pending]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var tid = btn.getAttribute('data-select-pending');
            var task = getTasksForMode().find(function (t) { return t.id === tid; });
            if (!task) return;
            (task.recipients || []).forEach(function (r) {
              if (!r.done) selected[selKey(tid, r.key)] = true;
            });
            renderRoot();
          });
        });

        document.querySelectorAll('[data-remind]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var tid = btn.getAttribute('data-remind');
            var keys = [];
            Object.keys(selected).forEach(function (sk) {
              if (sk.indexOf(tid + '::') === 0) keys.push(sk.split('::')[1]);
            });
            if (!keys.length) {
              alert('リマインドする対象にチェックを入れてください。');
              return;
            }
            var n = keys.length;
            var confirmMsg = mode === 'store'
              ? n + ' 店舗の担当者にリマインドを送信しますか？'
              : n + ' 名にリマインドを送信しますか？';
            if (!confirm(confirmMsg)) return;
            var introText = '';
            var ta = document.querySelector('textarea[data-intro-task="' + tid + '"]');
            if (ta) introText = ta.value;
            else introText = getIntroForTask(tid);

            btn.disabled = true;
            var origLabel = btn.textContent;
            btn.textContent = '送信中…';
            google.script.run
              .withSuccessHandler(function (res) {
                btn.disabled = false;
                btn.textContent = origLabel;
                alert((res && res.message) || '完了');
                if (res && res.ok) {
                  Object.keys(selected).forEach(function (sk) {
                    if (sk.indexOf(tid + '::') === 0) delete selected[sk];
                  });
                  load();
                }
              })
              .withFailureHandler(function (err) {
                btn.disabled = false;
                btn.textContent = origLabel;
                alert(err && err.message ? err.message : String(err));
              })
              .sendAdminTaskReminder(tid, keys, mode, introText);
          });
        });
      }

      function renderRoot() {
        var root = document.getElementById('root');
        if (mode === 'reminderEffect') {
          root.innerHTML = renderReminderEffects();
          bindPersonFilterEvents();
        } else {
          root.innerHTML = renderTaskList();
          bindTaskEvents();
        }
      }

      function openCount(list) {
        return (list || []).filter(function (t) { return !t.complete; }).length;
      }

      function renderModeBadges() {
        if (!lastData) return;
        var emp = openCount(lastData.employeeTasks);
        var store = openCount(lastData.storeTasks);
        var tf = openCount(lastData.tfTasks);
        var effectN = (lastData.reminderEffects && lastData.reminderEffects.tasks)
          ? lastData.reminderEffects.tasks.length
          : 0;
        [
          { id: 'badgeEmployee', n: emp },
          { id: 'badgeStore', n: store },
          { id: 'badgeTf', n: tf },
          { id: 'badgeReminderEffect', n: effectN }
        ].forEach(function (b) {
          var el = document.getElementById(b.id);
          if (!el) return;
          el.textContent = String(b.n);
          el.classList.toggle('empty', b.n <= 0);
        });
      }

      function renderAll() {
        document.querySelectorAll('.mode-nav-tile[data-mode]').forEach(function (c) {
          var on = c.getAttribute('data-mode') === mode;
          c.classList.toggle('on', on);
          c.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        renderModeBadges();
        renderStats();
        renderFilters();
        ensureDefaultOpenTask();
        renderRoot();
      }

      function showError(msg) {
        document.getElementById('root').innerHTML = '<div class="err">' + esc(msg) + '</div>';
      }

      function setMenuOpen(open) {
        document.getElementById('accountMenu').classList.toggle('open', open);
        document.getElementById('menuBackdrop').classList.toggle('open', open);
      }

      function applyData(data) {
        if (!data.ok) {
          showError(data.message || '読み込みに失敗しました');
          return;
        }
        lastData = data;
        pendingAutoOpen = true;
        var email = data.viewerEmail || '';
        document.getElementById('metaLine').textContent =
          '最終更新: ' + (data.generatedAt ? new Date(data.generatedAt).toLocaleString('ja-JP') : '—');
        var displayWho = (data.viewerName && data.viewerName.trim()) ? data.viewerName : (email ? email.split('@')[0] : '管理者');
        if (data.viewerTeam) displayWho += '（' + data.viewerTeam + ' チーム）';
        document.getElementById('menuWho').textContent = displayWho;
        document.getElementById('menuMail').textContent = email;
        document.getElementById('btnAccount').textContent = accountInitial(email);

        if (data.spreadsheetUrl) {
          var a = document.getElementById('linkSheet');
          a.href = data.spreadsheetUrl;
          a.style.display = 'flex';
        }
        var app = document.getElementById('linkApp');
        app.href = data.appUrl || window.location.href.split('?')[0];

        renderAll();
      }

      function load() {
        document.getElementById('root').innerHTML = '<div class="loading">読み込み中…</div>';
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
          showError('Google Apps Script の Web アプリとして開いてください。');
          return;
        }
        google.script.run.withSuccessHandler(applyData).withFailureHandler(function (e) {
          showError(e && e.message ? e.message : String(e));
        }).getAdminDashboardData();
      }

      document.querySelectorAll('.mode-nav-tile[data-mode]').forEach(function (tab) {
        tab.addEventListener('click', function () {
          mode = tab.getAttribute('data-mode') || 'employee';
          pendingAutoOpen = true;
          filter = 'all';
          typeFilter = 'all';
          renderAll();
        });
      });

      document.getElementById('btnRefresh').addEventListener('click', function () {
        setMenuOpen(false);
        load();
      });

      document.getElementById('btnAccount').addEventListener('click', function (e) {
        e.stopPropagation();
        var menu = document.getElementById('accountMenu');
        setMenuOpen(!menu.classList.contains('open'));
      });
      document.getElementById('menuBackdrop').addEventListener('click', function () { setMenuOpen(false); });

      var grid = document.getElementById('accentGrid');
      ACCENT_THEMES.forEach(function (t) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'accent-swatch';
        b.setAttribute('data-id', t.id);
        b.title = t.label;
        b.style.background = t['500'];
        b.addEventListener('click', function () { applyAccent(t.id); });
        grid.appendChild(b);
      });
      applyAccent(readAccent());
      load();
    })();
  </script>
</body>
</html>
