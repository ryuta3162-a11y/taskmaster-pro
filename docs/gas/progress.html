<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>チーム進捗ビュー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tm-title: 1rem;
      --tm-section: 0.875rem;
      --tm-body: 0.875rem;
      --tm-meta: 0.75rem;
      --tm-badge: 0.6875rem;
      --acc-50: oklch(96.2% 0.018 272.314);
      --acc-100: oklch(93% 0.034 272.788);
      --acc-200: oklch(87% 0.065 274.039);
      --acc-300: oklch(78.5% 0.115 274.713);
      --acc-400: oklch(67.3% 0.182 276.935);
      --acc-500: oklch(58.5% 0.233 277.117);
      --acc-600: oklch(51.1% 0.262 276.966);
      --acc-700: oklch(45.7% 0.24 277.023);
      --acc-900: oklch(35.9% 0.144 278.697);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: #f2f2f7;
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .shell {
      display: flex; flex-direction: column; min-height: 100dvh;
      max-width: 32rem; margin: 0 auto; width: 100%;
    }
    @media (min-width: 768px) { .shell { max-width: none; } }

    .topbar {
      position: sticky; top: 0; z-index: 40; flex-shrink: 0;
      height: 3.5rem;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
    }
    @media (min-width: 768px) { .topbar { height: 4rem; padding: 0 2rem; } }
    .brand-wrap { display: flex; align-items: center; gap: .75rem; min-width: 0; flex: 1; }
    .brand-mark {
      width: 2.25rem; height: 2.25rem; border-radius: 10px;
      background: var(--acc-500); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.06); flex-shrink: 0;
    }
    .brand-mark svg { width: 1.1rem; height: 1.1rem; stroke-width: 3; }
    .brand-col { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
    .brand-col .sub {
      font-size: 7px; font-weight: 600; letter-spacing: .18em;
      color: #64748b; text-transform: uppercase;
    }
    @media (min-width: 640px) { .brand-col .sub { font-size: 8px; } }
    .brand-col h1 {
      margin: 0; font-size: 1rem; font-weight: 700;
      letter-spacing: -.02em; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    @media (min-width: 640px) { .brand-col h1 { font-size: 1.125rem; } }
    .page-title {
      font-size: .875rem; font-weight: 600; color: #64748b;
      letter-spacing: -.01em; margin-left: .25rem; white-space: nowrap;
    }
    @media (max-width: 639px) { .page-title { display: none; } }

    .account-wrap { position: relative; flex-shrink: 0; }
    .account-btn {
      width: 2.25rem; height: 2.25rem; border-radius: 9999px; border: none; cursor: pointer;
      background: linear-gradient(to bottom right, var(--acc-500), var(--acc-700));
      color: #fff; font-size: .875rem; font-weight: 700;
      box-shadow: 0 0 0 2px #fff, 0 4px 14px -4px var(--acc-500);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .account-btn:active { transform: scale(.95); }
    .menu-backdrop {
      display: none; position: fixed; inset: 0; z-index: 45;
      background: rgba(0,0,0,.2); backdrop-filter: blur(2px);
    }
    .menu-backdrop.open { display: block; }
    .account-menu {
      display: none; position: absolute; right: 0; top: calc(100% + .5rem);
      width: min(18rem, 92vw); max-height: min(88vh, 36rem);
      background: rgba(255,255,255,.95); backdrop-filter: blur(16px);
      border-radius: 1rem; border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 20px 50px rgba(0,0,0,.15); z-index: 50; overflow: hidden;
      flex-direction: column;
    }
    .account-menu.open { display: flex; }
    .menu-head { padding: 1rem; border-bottom: 1px solid #f1f5f9; }
    .menu-head .who { font-weight: 600; font-size: .9rem; color: #0f172a; word-break: break-all; }
    .menu-head .mail { font-size: 11px; color: #64748b; margin-top: .15rem; word-break: break-all; }
    .menu-meta { padding: .65rem 1rem; font-size: .68rem; color: #64748b; font-weight: 500; border-bottom: 1px solid #f1f5f9; }
    .menu-accent { padding: .75rem 1rem; border-top: 1px solid #e2e8f0; background: linear-gradient(to bottom, #f8fafc, #fff); }
    .menu-accent label {
      display: block; font-size: 9px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: var(--acc-600); margin-bottom: .5rem;
    }
    .accent-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .35rem; }
    .accent-swatch {
      height: 2rem; border-radius: .5rem; border: 2px solid #e2e8f0;
      cursor: pointer; padding: 0; transition: all .15s;
    }
    .accent-swatch.on { border-color: #0f172a; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #0f172a; }
    .accent-current { text-align: center; font-size: 10px; font-weight: 700; color: #64748b; margin-top: .5rem; }
    .accent-current span { color: var(--acc-700); }
    .menu-actions { padding: .5rem; border-top: 1px solid #f1f5f9; background: rgba(248,250,252,.8); }
    .menu-link {
      display: flex; align-items: center; gap: .5rem; width: 100%;
      padding: .65rem .75rem; border: none; background: transparent;
      border-radius: .75rem; font-size: .8rem; font-weight: 600; color: #334155;
      cursor: pointer; text-decoration: none; text-align: left;
    }
    .menu-link:hover { background: #f1f5f9; }
    .readonly-note {
      margin: 0; padding: .5rem .75rem .65rem; font-size: .68rem; color: #64748b;
      border-top: 1px solid #f1f5f9; background: #f8fafc;
    }

    .main { flex: 1; overflow: auto; padding: 1rem .25rem 6rem; background: #f2f2f7; }
    @media (min-width: 768px) { .main { padding: 1.5rem 1rem 6rem; } }
    .main-inner { max-width: 120rem; margin: 0 auto; width: 100%; padding: 0 .25rem; }
    @media (min-width: 768px) { .main-inner { padding: 0 1rem; } }
    .stack { display: flex; flex-direction: column; gap: 1rem; margin-top: .25rem; width: 100%; }

    .status-strip {
      background: #fff; border-radius: 1rem;
      padding: .75rem 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
      display: flex; flex-wrap: wrap; align-items: baseline; gap: .35rem .9rem;
      font-size: .875rem; color: #475569;
    }
    .status-strip strong { color: #0f172a; font-weight: 800; font-size: 1rem; font-variant-numeric: tabular-nums; }
    .status-strip .sep { color: #cbd5e1; user-select: none; }
    .status-strip .warn strong { color: #e11d48; }

    .panel-frame {
      position: relative; border-radius: 1rem; overflow: hidden;
      border: 1px solid color-mix(in oklch, var(--acc-300) 40%, transparent);
      box-shadow: 0 8px 32px -12px rgba(0,0,0,.1);
    }
    .panel-frame::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom right, color-mix(in oklch, var(--acc-50) 75%, transparent), #fff, #f8fafc);
    }
    .panel-frame::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(to bottom, #34d399, var(--acc-500), var(--acc-700));
    }
    .panel-inner { position: relative; padding: 1rem 1rem 1rem 1.35rem; }
    .team-row {
      display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: .75rem;
    }
    .team-row label { font-size: var(--tm-meta); font-weight: 700; color: #64748b; }
    .team-row select {
      flex: 1; min-width: 8rem; max-width: 14rem;
      padding: .55rem .75rem; border-radius: .75rem;
      border: 1px solid color-mix(in oklch, var(--acc-200) 60%, transparent);
      background: #fff; font-size: var(--tm-body); font-weight: 600; color: #334155;
      font-family: inherit;
    }
    .chip-arena {
      display: flex; flex-wrap: wrap; gap: .5rem;
      border-radius: .75rem;
      border: 1px solid color-mix(in oklch, var(--acc-200) 45%, transparent);
      background: linear-gradient(to bottom, rgba(15,23,42,.03), #fff, color-mix(in oklch, var(--acc-50) 25%, transparent));
      padding: .75rem;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.05);
    }
    .chip {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 2.5rem; padding: .5rem .85rem; border-radius: .75rem;
      font-size: var(--tm-body); font-weight: 600; cursor: pointer; border: none;
      background: rgba(255,255,255,.9); color: #334155;
      border: 1px solid color-mix(in oklch, var(--acc-200) 60%, transparent);
      transition: all .15s;
    }
    .chip:hover { border-color: var(--acc-400); background: color-mix(in oklch, var(--acc-50) 60%, white); }
    .chip.on {
      background: linear-gradient(to bottom right, var(--acc-500), var(--acc-700));
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px -4px var(--acc-500);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .55rem 1rem; font-size: .8rem; font-weight: 600; border-radius: 1rem;
      border: 1px solid rgba(0,0,0,.06); background: #fff; color: #334155;
      cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .btn-sm { padding: .4rem .75rem; font-size: .75rem; }

    .task-list { display: flex; flex-direction: column; gap: .625rem; }
    .menu-tile {
      width: 100%; text-align: left; background: #fff;
      border-radius: 1rem; padding: 1rem 1.15rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.04);
      display: block;
      cursor: pointer; transition: transform .15s, border-color .15s;
    }
    @media (min-width: 768px) { .menu-tile { padding: 1.1rem 1.25rem; } }
    .menu-tile:active { transform: scale(.99); }
    .menu-tile.open { border-color: color-mix(in oklch, var(--acc-300) 50%, transparent); }
    .menu-body { width: 100%; min-width: 0; }
    .badges { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .35rem; }
    .badge {
      font-size: .65rem; font-weight: 700; padding: .12rem .45rem; border-radius: .4rem;
    }
    .badge-run { background: var(--acc-50); color: var(--acc-900); border: 1px solid var(--acc-200); }
    .badge-ok { background: #f1f5f9; color: #475569; }
    .badge-late { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .badge-kind-tf { background: linear-gradient(to right, var(--acc-600), var(--acc-700)); color: #fff; }
    .task-title { font-size: var(--tm-title); font-weight: 700; line-height: 1.45; margin: 0 0 .25rem; word-break: break-word; color: #0f172a; }
    .task-meta { font-size: var(--tm-meta); color: #64748b; font-weight: 500; }
    .prog-wrap { margin-top: .5rem; max-width: 100%; }
    .prog { height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .prog > i { display: block; height: 100%; background: linear-gradient(90deg, var(--acc-500), var(--acc-700)); border-radius: 99px; }
    .tap-hint { font-size: .68rem; color: #94a3b8; font-weight: 600; margin-top: .35rem; }

    .url-book {
      margin-top: .75rem; border-radius: .75rem;
      border: 1px solid color-mix(in oklch, var(--acc-200) 45%, transparent);
      background: rgba(255,255,255,.7); padding: .5rem .65rem;
    }
    .url-book summary {
      cursor: pointer; font-size: var(--tm-meta); font-weight: 700; color: var(--acc-700);
      list-style: none; padding: .25rem .15rem;
    }
    .url-book summary::-webkit-details-marker { display: none; }
    .url-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: .35rem .5rem;
      padding: .45rem 0; border-top: 1px solid #f1f5f9;
    }
    .url-row:first-of-type { border-top: none; }
    .url-team { font-size: var(--tm-meta); font-weight: 700; color: #334155; min-width: 6.5rem; }
    .url-link {
      flex: 1; min-width: 0; font-size: .68rem; color: #64748b; word-break: break-all;
      text-decoration: none;
    }
    .url-link:hover { color: var(--acc-700); }
    .btn-copy {
      padding: .25rem .55rem; font-size: .68rem; font-weight: 700; border-radius: .5rem;
      border: 1px solid #e2e8f0; background: #fff; color: #475569; cursor: pointer;
    }

    .task-expand-wrap { display: none; margin-top: -.35rem; }
    .task-expand-wrap.open { display: block; }
    .expand-panel { margin-top: 0; }
    .expand-hint { font-size: var(--tm-meta); color: #64748b; font-weight: 600; margin: 0 0 .65rem; }
    .recipient {
      display: flex; align-items: flex-start; gap: .55rem; padding: .6rem .7rem;
      border: 1px solid rgba(0,0,0,.05); border-radius: .75rem; margin-bottom: .4rem;
      background: rgba(255,255,255,.85);
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .recipient:hover { border-color: var(--acc-300); background: color-mix(in oklch, var(--acc-50) 30%, white); }
    .recipient.done { opacity: .55; background: #f1f5f9; border-color: #e2e8f0; cursor: not-allowed; }
    .recipient.done:hover { border-color: #e2e8f0; background: #f1f5f9; }
    .recipient.done .recipient-name { color: #94a3b8; }
    .recipient input[type=checkbox] {
      width: 1.1rem; height: 1.1rem; margin-top: .15rem;
      accent-color: var(--acc-600); flex-shrink: 0;
    }
    .recipient-label { flex: 1; min-width: 0; }
    .recipient-name { font-size: var(--tm-body); font-weight: 600; }
    .recipient-sub { font-size: .68rem; color: #64748b; margin-top: .15rem; }
    .status-pill { font-size: var(--tm-badge); font-weight: 700; padding: .15rem .45rem; border-radius: .35rem; flex-shrink: 0; }
    .status-pill.ok { background: #ecfdf5; color: #047857; }
    .status-pill.ng { background: #fff1f2; color: #be123c; }

    .expand-toolbar {
      display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: .75rem;
    }
    .expand-toolbar .hint { font-size: var(--tm-meta); color: #64748b; font-weight: 600; flex: 1; min-width: 8rem; }
    .btn-primary {
      background: var(--acc-500); color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px -4px var(--acc-500);
    }
    .btn-primary:hover { background: var(--acc-600); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .send-note {
      margin: .75rem 0 0; padding: .6rem .75rem; border-radius: .65rem;
      background: color-mix(in oklch, var(--acc-50) 60%, white);
      border: 1px solid color-mix(in oklch, var(--acc-200) 50%, transparent);
      font-size: .7rem; color: #475569; line-height: 1.5;
    }
    .send-note strong { color: var(--acc-700); }

    .intro-block {
      margin: 0 0 .75rem; padding: .65rem .8rem;
      border-radius: .8rem; background: #fff;
      border: 1px solid color-mix(in oklch, var(--acc-200) 50%, transparent);
    }
    .intro-block label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: var(--tm-meta); font-weight: 700; color: var(--acc-700);
      margin-bottom: .35rem;
    }
    .intro-block label .right { display: flex; gap: .35rem; }
    .intro-block textarea {
      width: 100%; min-height: 5.5rem; resize: vertical;
      border: 1px solid #e2e8f0; border-radius: .55rem;
      padding: .55rem .65rem; font-size: .82rem; line-height: 1.55;
      font-family: inherit; color: #0f172a;
      background: #fafafe; outline: none;
    }
    .intro-block textarea:focus { border-color: var(--acc-400); background: #fff; }
    .btn-link {
      background: transparent; border: none; padding: 0;
      font-size: .7rem; font-weight: 700; color: var(--acc-600); cursor: pointer;
    }
    .btn-link:hover { text-decoration: underline; }

    .empty, .loading {
      text-align: center; padding: 3rem 1rem; font-weight: 600; font-size: .9rem; color: #94a3b8;
    }
    .loading { color: var(--acc-600); }
    .err {
      padding: 1.5rem; text-align: center; font-weight: 600; color: #e11d48;
      background: #fff; border-radius: 1rem; border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="brand-col">
          <span class="sub">Task Force Team</span>
          <h1>To-Do List</h1>
        </div>
        <span class="page-title">進捗（閲覧専用）</span>
      </div>
      <div class="account-wrap">
        <button type="button" class="account-btn" id="btnAccount" aria-label="メニュー">進</button>
        <div class="menu-backdrop" id="menuBackdrop"></div>
        <div class="account-menu" id="accountMenu">
          <div class="menu-head">
            <div class="who" id="menuWho">閲覧者</div>
            <div class="mail" id="menuMail"></div>
          </div>
          <p class="menu-meta" id="metaLine">読み込み中…</p>
          <div class="menu-accent">
            <label>アクセントカラー</label>
            <div class="accent-grid" id="accentGrid"></div>
            <p class="accent-current">現在: <span id="accentLabel">インディゴ</span></p>
          </div>
          <div class="menu-actions">
            <button type="button" class="menu-link" id="btnRefresh">↻ 再読み込み</button>
            <a class="menu-link" id="linkSheet" href="#" target="_blank" rel="noopener" style="display:none">📊 スプレッドシート</a>
            <a class="menu-link" id="linkApp" href="#" target="_top">↗ 利用者アプリ</a>
          </div>
          <p class="readonly-note" id="readonlyNote">タスクを開くと、未実施者を選んでリマインド送信できます（送信者: あなた）</p>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="main-inner stack">
        <div id="statsBar" class="status-strip">読み込み中…</div>

        <div class="panel-frame" id="teamPanel">
          <div class="panel-inner">
            <div class="team-row">
              <label for="teamSelect">チーム</label>
              <select id="teamSelect" aria-label="チームを選択"></select>
              <button type="button" class="btn btn-sm" id="btnApply">表示更新</button>
            </div>
            <div id="filtersBar" class="chip-arena"></div>
            <details class="url-book" id="urlBook">
              <summary>チーム別ブックマークURL（配布用）</summary>
              <div id="urlBookBody"></div>
            </details>
          </div>
        </div>

        <div id="root"><div class="loading">読み込み中…</div></div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var ACCENT_THEMES = [
        { id: 'indigo', label: 'インディゴ', 50: 'oklch(96.2% 0.018 272.314)', 100: 'oklch(93% 0.034 272.788)', 200: 'oklch(87% 0.065 274.039)', 300: 'oklch(78.5% 0.115 274.713)', 400: 'oklch(67.3% 0.182 276.935)', 500: 'oklch(58.5% 0.233 277.117)', 600: 'oklch(51.1% 0.262 276.966)', 700: 'oklch(45.7% 0.24 277.023)', 900: 'oklch(35.9% 0.144 278.697)' },
        { id: 'violet', label: 'バイオレット', 50: 'oklch(96.9% 0.016 293.756)', 100: 'oklch(94.3% 0.029 294.588)', 200: 'oklch(89.4% 0.057 293.283)', 300: 'oklch(81.1% 0.111 293.571)', 400: 'oklch(70.2% 0.183 293.541)', 500: 'oklch(60.6% 0.25 292.717)', 600: 'oklch(54.1% 0.281 293.009)', 700: 'oklch(49.1% 0.27 292.581)', 900: 'oklch(38% 0.189 293.745)' },

      var ACCENT_STORAGE_KEY = 'taskmaster_accent_id';

      var initialTeam = (window.__TM_PROGRESS_TEAM__ || '').trim();
      var filter = 'all';
      var lastData = null;
      var openTaskId = null;
      var selected = {};
      var introOverrides = {};
      var teamSelect = document.getElementById('teamSelect');

      function selKey(taskId, key) { return taskId + '::' + key; }

      function viewerNameLabel() {
        if (lastData && lastData.viewerName && lastData.viewerName.trim()) return lastData.viewerName.trim();
        if (lastData && lastData.viewerEmail) return String(lastData.viewerEmail).split('@')[0];
        return '担当';
      }

      function defaultIntroText() {
        var team = (lastData && lastData.viewerTeam) ? lastData.viewerTeam : '';
        var teamLabel = team ? team + 'チーム' : 'TFチーム';
        var name = viewerNameLabel();
        return [
          'お元気様です。',
          teamLabel + '\u3000の' + name + 'です。',
          '',
          '下記、未完了の依頼がありましたので、ご確認・ご対応のほどよろしくお願いいたします。'
        ].join('\n');
      }

      function getIntroForTask(taskId) {
        if (Object.prototype.hasOwnProperty.call(introOverrides, taskId)) {
          return introOverrides[taskId];
        }
        return defaultIntroText();
      }

      function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function accountInitial(email) {
        if (!email) return '進';
        var local = String(email).split('@')[0];
        return local ? local.charAt(0).toUpperCase() : '進';
      }

      function applyAccent(id) {
        var t = ACCENT_THEMES.find(function (x) { return x.id === id; }) || ACCENT_THEMES[0];
        ['50','100','200','300','400','500','600','700','900'].forEach(function (k) {
          document.documentElement.style.setProperty('--acc-' + k, t[k]);
        });
        try { localStorage.setItem(ACCENT_STORAGE_KEY, t.id); } catch (e) {}
        document.querySelectorAll('.accent-swatch').forEach(function (el) {
          el.classList.toggle('on', el.getAttribute('data-id') === t.id);
        });
        var lab = document.getElementById('accentLabel');
        if (lab) lab.textContent = t.label;
      }

      function readAccent() {
        try {
          var v = localStorage.getItem(ACCENT_STORAGE_KEY);
          if (v && ACCENT_THEMES.some(function (t) { return t.id === v; })) return v;
        } catch (e) {}
        return 'indigo';
      }

      function getTasks() {
        return (lastData && lastData.tfTasks) ? lastData.tfTasks : [];
      }

      function filterTasks(list) {
        return list.filter(function (t) {
          if (filter === 'open') return !t.complete;
          if (filter === 'late') return !t.complete && t.overdue;
          return true;
        });
      }

      function buildClientProgressUrl(teamName) {
        var base = window.location.href.split('?')[0];
        var q = '?page=progress';
        if (teamName) q += '&team=' + encodeURIComponent(teamName);
        return base + q;
      }

      function copyUrl(text, btn) {
        if (!text) return;
        function done() {
          if (!btn) return;
          var prev = btn.textContent;
          btn.textContent = 'コピー済';
          setTimeout(function () { btn.textContent = prev; }, 1200);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(function () {
            window.prompt('URLをコピーしてください', text);
          });
        } else {
          window.prompt('URLをコピーしてください', text);
        }
      }

      function renderUrlBook() {
        var body = document.getElementById('urlBookBody');
        if (!body) return;
        var allUrl = (lastData && lastData.progressUrlAll) || buildClientProgressUrl('');
        var rows = (lastData && lastData.teamUrls) || [];
        if (!rows.length && lastData && lastData.availableTeams) {
          rows = lastData.availableTeams.map(function (t) {
            return { team: t, url: buildClientProgressUrl(t) };
          });
        }
        var html = '';
        html += '<div class="url-row"><span class="url-team">全チーム</span>';
        html += '<a class="url-link" href="' + esc(allUrl) + '" target="_blank" rel="noopener">' + esc(allUrl) + '</a>';
        html += '<button type="button" class="btn-copy" data-copy="' + esc(allUrl) + '">コピー</button></div>';
        rows.forEach(function (row) {
          var u = row.url || buildClientProgressUrl(row.team);
          html += '<div class="url-row"><span class="url-team">' + esc(row.team) + '</span>';
          html += '<a class="url-link" href="' + esc(u) + '" target="_blank" rel="noopener">' + esc(u) + '</a>';
          html += '<button type="button" class="btn-copy" data-copy="' + esc(u) + '">コピー</button></div>';
        });
        body.innerHTML = html;
        body.querySelectorAll('.btn-copy').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            copyUrl(btn.getAttribute('data-copy'), btn);
          });
        });
      }

      function renderStats() {
        var list = getTasks();
        var open = list.filter(function (t) { return !t.complete; }).length;
        var late = list.filter(function (t) { return !t.complete && t.overdue; }).length;
        var done = list.filter(function (t) { return t.complete; }).length;
        var total = list.length;
        var rate = total ? Math.round((done / total) * 100) : 0;
        var teamLabel = (lastData && lastData.selectedTeam) ? lastData.selectedTeam : '全チーム';
        document.getElementById('statsBar').innerHTML =
          'チーム <strong>' + esc(teamLabel) + '</strong>' +
          '<span class="sep">/</span>' +
          '未完了 <strong>' + open + '</strong><span style="font-weight:700;color:#64748b"> 件</span>' +
          '<span class="sep">/</span>' +
          '<span class="warn">期限超過 <strong>' + late + '</strong><span style="font-weight:700;color:#64748b"> 件</span></span>' +
          '<span class="sep">/</span>' +
          '完了率 <strong>' + rate + '</strong><span style="font-weight:700;color:#64748b"> %</span>';
      }

      function renderFilters() {
        var bar = document.getElementById('filtersBar');
        bar.innerHTML =
          '<button type="button" class="chip' + (filter === 'all' ? ' on' : '') + '" data-f="all">すべて</button>' +
          '<button type="button" class="chip' + (filter === 'open' ? ' on' : '') + '" data-f="open">未完了のみ</button>' +
          '<button type="button" class="chip' + (filter === 'late' ? ' on' : '') + '" data-f="late">期限超過のみ</button>';
        bar.querySelectorAll('.chip').forEach(function (el) {
          el.addEventListener('click', function () {
            filter = el.getAttribute('data-f') || 'all';
            openTaskId = null;
            renderAll();
          });
        });
      }

      function renderTeamOptions() {
        var teams = (lastData && lastData.availableTeams) ? lastData.availableTeams.slice() : [];
        var selected = (lastData && lastData.selectedTeam) ? lastData.selectedTeam : '';
        var html = '<option value="">全チーム（すべてのTF依頼）</option>';
        teams.forEach(function (name) {
          html += '<option value="' + esc(name) + '"' + (selected === name ? ' selected' : '') + '>' + esc(name) + '</option>';
        });
        if (selected && teams.indexOf(selected) < 0) {
          html += '<option value="' + esc(selected) + '" selected>' + esc(selected) + '</option>';
        }
        teamSelect.innerHTML = html;
      }

      function renderRecipients(task) {
        var h = '<div class="panel-frame expand-panel"><div class="panel-inner">';
        var recipients = task.recipients || [];
        var isStore = task.requestKind === 'store';

        var introText = getIntroForTask(task.id);
        h += '<div class="intro-block">';
        h += '<label>';
        h += '<span>挨拶文（編集できます）</span>';
        h += '<span class="right">';
        h += '<button type="button" class="btn-link" data-reset-intro="' + esc(task.id) + '">テンプレートに戻す</button>';
        h += '</span>';
        h += '</label>';
        h += '<textarea data-intro-task="' + esc(task.id) + '" rows="5" spellcheck="false">' + esc(introText) + '</textarea>';
        h += '</div>';

        h += '<div class="expand-toolbar">';
        h += '<span class="hint">' + (isStore ? '未完了の店舗を選んでリマインド（完了済みは選択不可）' : '未実施の方を選んでリマインド') + '</span>';
        h += '<button type="button" class="btn btn-sm" data-select-pending="' + esc(task.id) + '">未実施をすべて選択</button>';
        h += '<button type="button" class="btn btn-primary btn-sm" data-remind="' + esc(task.id) + '" data-mode="' + (isStore ? 'store' : 'employee') + '">' + (isStore ? '選択した店舗にリマインド' : '選択した人にリマインド') + '</button>';
        h += '</div>';

        if (!recipients.length) {
          h += '<p class="expand-hint">対象データがありません</p>';
        } else {
          recipients.slice().sort(function (a, b) {
            if (!!a.done !== !!b.done) return a.done ? 1 : -1;
            return String(a.label || a.storeName || a.name).localeCompare(String(b.label || b.storeName || b.name), 'ja');
          }).forEach(function (r) {
            var sk = selKey(task.id, r.key);
            var statusLabel = isStore ? (r.done ? '完了' : '未完了') : (r.done ? '実施済' : '未実施');
            var checked = selected[sk] && !r.done ? ' checked' : '';
            var disabled = r.done ? ' disabled' : '';
            h += '<label class="recipient' + (r.done ? ' done' : '') + '">';
            h += '<input type="checkbox" data-sk="' + esc(sk) + '"' + checked + disabled + ' />';
            h += '<div class="recipient-label"><div class="recipient-name">' + esc(r.label || r.name || r.storeName) + '</div>';
            if (r.email) h += '<div class="recipient-sub">' + esc(r.email) + '</div>';
            h += '</div>';
            h += '<span class="status-pill ' + (r.done ? 'ok' : 'ng') + '">' + statusLabel + '</span>';
            h += '</label>';
          });
        }

        var fromLabel = (lastData && (lastData.viewerName || lastData.viewerEmail)) || '—';
        var teamSuffix = (lastData && lastData.viewerTeam) ? '（' + lastData.viewerTeam + ' チーム）' : '';
        var replyTo = (lastData && lastData.viewerEmail) || '—';
        h += '<div class="send-note">送信時の表示名: <strong>' + esc(fromLabel + teamSuffix) + '</strong><br>返信先（Reply-To）: <strong>' + esc(replyTo) + '</strong><br>※ Gmail の仕様上、送信元アドレスはシステム共通になりますが、表示名と返信先がリーダーになるため、受信者にはあなたからのリマインドとして届きます。</div>';

        h += '</div></div>';
        return h;
      }

      function renderTaskList() {
        var list = filterTasks(getTasks());
        if (!list.length) {
          var teamNote = (lastData && lastData.selectedTeam)
            ? '（チーム: ' + esc(lastData.selectedTeam) + '）'
            : '';
          return '<div class="empty">該当するTF依頼はありません' + teamNote + '<br><span style="font-size:.8rem;font-weight:500;color:#94a3b8;margin-top:.5rem;display:block">To-Doの「TFチーム依頼」で配信したもの、または宛先タグが TF… の依頼が対象です。<br>社員依頼・店舗依頼のみの場合はここには出ません。</span></div>';
        }
        var h = '<div class="task-list">';
        list.forEach(function (t) {
          var isOpen = openTaskId === t.id;
          var st = t.complete ? 'badge-ok' : t.overdue ? 'badge-late' : 'badge-run';
          h += '<div>';
          h += '<button type="button" class="menu-tile' + (isOpen ? ' open' : '') + '" data-task-id="' + esc(t.id) + '" aria-expanded="' + isOpen + '">';
          h += '<div class="menu-body">';
          h += '<div class="badges">';
          h += '<span class="badge ' + st + '">' + esc(t.statusLabel) + '</span>';
          h += '<span class="badge badge-kind-tf">' + esc(t.requestKindLabel || 'TFチーム依頼') + '</span>';
          h += '</div>';
          h += '<p class="task-title">' + esc(t.contentPreview) + '</p>';
          h += '<div class="task-meta">期限 ' + esc(t.deadline || '—') + ' · ' + esc(t.sender) + ' · ' + esc(t.progressLabel) + '</div>';
          if (t.targetTags) h += '<div class="task-meta" style="margin-top:.2rem">宛先: ' + esc(t.targetTags) + '</div>';
          h += '<div class="prog-wrap"><div class="prog"><i style="width:' + (t.progressPct || 0) + '%"></i></div></div>';
          h += '<div class="tap-hint">' + (isOpen ? 'タップで閉じる' : 'タップで実施状況を見る') + '</div>';
          h += '</div>';
          h += '</button>';
          h += '<div class="task-expand-wrap' + (isOpen ? ' open' : '') + '">' + (isOpen ? renderRecipients(t) : '') + '</div>';
          h += '</div>';
        });
        h += '</div>';
        return h;
      }

      function getCurrentTeam() {
        return (lastData && lastData.selectedTeam) ? lastData.selectedTeam : '';
      }

      function findTask(id) {
        return getTasks().find(function (t) { return String(t.id) === String(id); }) || null;
      }

      function bindTaskEvents() {
        document.querySelectorAll('.menu-tile[data-task-id]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = btn.getAttribute('data-task-id');
            openTaskId = openTaskId === id ? null : id;
            renderRoot();
          });
        });

        document.querySelectorAll('input[data-sk]').forEach(function (cb) {
          cb.addEventListener('click', function (e) { e.stopPropagation(); });
          cb.addEventListener('change', function (e) {
            e.stopPropagation();
            var sk = cb.getAttribute('data-sk');
            if (cb.checked) selected[sk] = true;
            else delete selected[sk];
          });
        });

        document.querySelectorAll('textarea[data-intro-task]').forEach(function (ta) {
          ta.addEventListener('click', function (e) { e.stopPropagation(); });
          ta.addEventListener('input', function () {
            var tid = ta.getAttribute('data-intro-task');
            introOverrides[tid] = ta.value;
          });
        });

        document.querySelectorAll('[data-reset-intro]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var tid = btn.getAttribute('data-reset-intro');
            delete introOverrides[tid];
            var ta = document.querySelector('textarea[data-intro-task="' + tid + '"]');
            if (ta) ta.value = defaultIntroText();
          });
        });

        document.querySelectorAll('[data-select-pending]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var tid = btn.getAttribute('data-select-pending');
            var task = findTask(tid);
            if (!task) return;
            (task.recipients || []).forEach(function (r) {
              if (!r.done) selected[selKey(tid, r.key)] = true;
            });
            renderRoot();
          });
        });

        document.querySelectorAll('[data-remind]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var tid = btn.getAttribute('data-remind');
            var mode = btn.getAttribute('data-mode') || 'employee';
            var keys = [];
            Object.keys(selected).forEach(function (sk) {
              if (sk.indexOf(tid + '::') === 0) keys.push(sk.substring((tid + '::').length));
            });
            if (!keys.length) {
              alert('リマインドする対象にチェックを入れてください。');
              return;
            }
            var n = keys.length;
            var msg = mode === 'store'
              ? n + ' 店舗の担当者にリマインドを送信しますか？\n（送信者表示: あなた）'
              : n + ' 名にリマインドを送信しますか？\n（送信者表示: あなた）';
            if (!confirm(msg)) return;
            var introText = '';
            var ta = document.querySelector('textarea[data-intro-task="' + tid + '"]');
            if (ta) introText = ta.value;
            else introText = getIntroForTask(tid);

            btn.disabled = true;
            btn.textContent = '送信中…';
            google.script.run
              .withSuccessHandler(function (res) {
                btn.disabled = false;
                btn.textContent = mode === 'store' ? '選択した店舗にリマインド' : '選択した人にリマインド';
                alert((res && res.message) || '完了');
                if (res && res.ok) {
                  Object.keys(selected).forEach(function (sk) {
                    if (sk.indexOf(tid + '::') === 0) delete selected[sk];
                  });
                  load(getCurrentTeam());
                }
              })
              .withFailureHandler(function (err) {
                btn.disabled = false;
                btn.textContent = mode === 'store' ? '選択した店舗にリマインド' : '選択した人にリマインド';
                alert(err && err.message ? err.message : String(err));
              })
              .sendTeamProgressReminder(tid, keys, mode, getCurrentTeam(), introText);
          });
        });
      }

      function renderRoot() {
        var root = document.getElementById('root');
        root.innerHTML = renderTaskList();
        bindTaskEvents();
      }

      function renderAll() {
        renderTeamOptions();
        renderStats();
        renderFilters();
        renderUrlBook();
        renderRoot();
      }

      function showError(msg) {
        document.getElementById('root').innerHTML = '<div class="err">' + esc(msg) + '</div>';
        document.getElementById('statsBar').textContent = '—';
      }

      function setMenuOpen(open) {
        document.getElementById('accountMenu').classList.toggle('open', open);
        document.getElementById('menuBackdrop').classList.toggle('open', open);
      }

      function applyData(data) {
        if (!data || !data.ok) {
          showError((data && data.message) || '読み込みに失敗しました');
          return;
        }
        lastData = data;
        openTaskId = null;
        var email = data.viewerEmail || '';
        document.getElementById('metaLine').textContent =
          '最終更新: ' + (data.generatedAt ? new Date(data.generatedAt).toLocaleString('ja-JP') : '—');
        var displayWho = (data.viewerName && data.viewerName.trim()) ? data.viewerName : (email ? email.split('@')[0] : '閲覧者');
        if (data.viewerTeam) displayWho += '（' + data.viewerTeam + ' チーム）';
        document.getElementById('menuWho').textContent = displayWho;
        document.getElementById('menuMail').textContent = email;
        var note = document.getElementById('readonlyNote');
        if (note) {
          note.textContent = 'リマインドは「' + displayWho + '」名で送信されます（返信は ' + (email || 'あなた') + ' に届きます）';
        }
        document.getElementById('btnAccount').textContent = accountInitial(email);
        if (data.spreadsheetUrl) {
          var a = document.getElementById('linkSheet');
          a.href = data.spreadsheetUrl;
          a.style.display = 'flex';
        }
        document.getElementById('linkApp').href = data.appUrl || window.location.href.split('?')[0];
        renderAll();
      }

      function load(teamName) {
        document.getElementById('root').innerHTML = '<div class="loading">読み込み中…</div>';
        document.getElementById('statsBar').textContent = '読み込み中…';
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
          applyData({ ok: false, message: 'Google Apps Script の Web アプリとして開いてください。' });
          return;
        }
        google.script.run
          .withSuccessHandler(applyData)
          .withFailureHandler(function (e) {
            applyData({ ok: false, message: e && e.message ? e.message : String(e) });
          })
          .getTeamProgressData(teamName || '');
      }

      document.getElementById('btnApply').addEventListener('click', function () {
        filter = 'all';
        openTaskId = null;
        load(teamSelect.value || '');
      });
      document.getElementById('btnRefresh').addEventListener('click', function () {
        setMenuOpen(false);
        load((lastData && lastData.selectedTeam) || teamSelect.value || '');
      });
      document.getElementById('btnAccount').addEventListener('click', function (e) {
        e.stopPropagation();
        setMenuOpen(!document.getElementById('accountMenu').classList.contains('open'));
      });
      document.getElementById('menuBackdrop').addEventListener('click', function () { setMenuOpen(false); });

      var grid = document.getElementById('accentGrid');
      ACCENT_THEMES.forEach(function (t) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'accent-swatch';
        b.setAttribute('data-id', t.id);
        b.title = t.label;
        b.style.background = t['500'];
        b.addEventListener('click', function () { applyAccent(t.id); });
        grid.appendChild(b);
      });
      applyAccent(readAccent());
      load(initialTeam);
    })();
  </script>
</body>
</html>
