<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="To Do List 運用判断テスト。" />
  <title>運用判断テスト | To Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="test-page">
  <header class="site-header">
    <a class="site-brand" href="index.html#register">
      <span class="brand-mark">TD</span>
      <span>To Do List</span>
    </a>
    <div class="header-actions">
      <a class="btn btn-secondary" href="index.html#quiz">ガイドへ戻る</a>
    </div>
  </header>

  <main class="test-main">
    <section class="test-shell">
      <header class="test-header">
        <p class="section-num">理解度チェック</p>
        <h1>運用判断テスト</h1>
      </header>

      <section class="test-panel" data-test-auth>
        <form class="test-auth-form" data-test-auth-form novalidate>
          <label for="test-email">メールアドレス</label>
          <div class="test-auth-row">
            <input id="test-email" type="email" autocomplete="email" placeholder="name@okamoto-group.co.jp" data-test-email required>
            <button type="submit" data-test-auth-button>開始</button>
          </div>
          <p class="test-message" data-test-auth-message aria-live="polite">入力後、すぐにテストを開始します。</p>
        </form>
      </section>

      <section class="test-panel test-panel--quiz" data-test-quiz hidden>
        <div class="test-quiz-head">
          <div>
            <h2>各問題で①②を選んでください</h2>
            <p data-test-user></p>
          </div>
          <strong data-test-progress>0 / 6</strong>
        </div>

        <section class="test-intro" data-test-intro>
          <p>全<strong>6問</strong>です。各問題ごとに、次の<strong>2つ</strong>を選びます。</p>
          <ul class="test-intro-list">
            <li><strong>① 依頼の種類</strong> … 店舗 / 社員 / TFチーム</li>
            <li><strong>② 配信方法</strong> … 新規投稿 / 再投稿 / 定期配信</li>
          </ul>
          <p class="test-intro-note">どちらか1つだけ選んでも不合格になります。アプリの画面と同じ用語です。</p>
          <button type="button" class="test-intro-start" data-test-start>テストを始める</button>
        </section>

        <form class="test-questions" data-test-form data-test-quiz-body hidden novalidate>
          <div data-test-questions></div>
          <div class="test-actions">
            <button type="submit" data-test-submit disabled>結果を送信</button>
            <p class="test-message" data-test-submit-message aria-live="polite">各問題で①依頼の種類と②配信方法の両方を選ぶと送信できます。</p>
          </div>
        </form>
      </section>

      <section class="test-result" data-test-result hidden aria-live="polite"></section>
    </section>
  </main>

  <script src="guide-config.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
