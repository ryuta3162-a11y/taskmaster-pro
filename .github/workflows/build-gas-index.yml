# 社用PCで Node が使えなくても、GitHub 上で index.html をビルドしてダウンロードできます。
# 使い方: GitHub → Actions → 「Build GAS index」→ Run workflow → 完了後 Artifacts から index.html を取得

name: Build GAS index

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Copy to docs/gas/deployed (repo mirror)
        run: cp dist/index.html docs/gas/deployed/index.html

      - name: Upload index.html for GAS
        uses: actions/upload-artifact@v4
        with:
          name: gas-index-html
          path: dist/index.html
          retention-days: 30
